# Прод: только готовые образы из ghcr.io — на сервере не нужен исходный код и docker build.
# Файл в КОРНЕ репо: на сервере лежит рядом с .env → env_file: .env работает.
# Обновление: push в main → GitHub собирает образа → deploy тянет этот файл с raw и docker compose pull.
name: my_assistant

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-my_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-my_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  api:
    image: ghcr.io/graffinme-del/my_assistant/api:main
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Секреты из .env / .env.local — не через ${OPENAI_API_KEY:-}: пустая подстановка затирала ключ.
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      APP_PORT: "8000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - api_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 60s

  worker:
    image: ghcr.io/graffinme-del/my_assistant/worker:main
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: true
      - path: .env.local
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      WORKER_API_BASE: http://api:8000
      MOY_ARBITR_STATE_PATH: ${MOY_ARBITR_STATE_PATH:-/app/moy_arbitr/state.json}
    volumes:
      - moy_arbitr_state:/app/moy_arbitr

  web:
    image: ghcr.io/graffinme-del/my_assistant/web:main
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
  minio_data:
  api_storage:
  moy_arbitr_state:
