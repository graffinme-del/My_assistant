name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy on server (git clone/pull, not rsync)
        run: |
          DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "export DEPLOY_ROOT='${DEPLOY_PATH}' GIT_REPO_URL='https://github.com/graffinme-del/My_assistant.git' GIT_BRANCH='main'; bash -s" \
            < infra/deploy_on_server.sh
