name: Deploy

# Быстрый автодеплой: сразу при push в main (плюс ручной запуск).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  actions: write # кэш слоёв Docker (type=gha)

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Три образа параллельно + кэш pip/apt/playwright между пушами (раньше шли по очереди без кэша).
  publish:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            context: apps/api
            image: ghcr.io/graffinme-del/my_assistant/api
          - name: worker
            context: apps/worker
            image: ghcr.io/graffinme-del/my_assistant/worker
          - name: web
            context: apps/web
            image: ghcr.io/graffinme-del/my_assistant/web
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ matrix.image }}:main
            ${{ matrix.image }}:latest
          cache-from: type=gha,scope=build-${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=build-${{ matrix.name }}

  deploy:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.HETZNER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "${{ secrets.HETZNER_HOST }}" >> ~/.ssh/known_hosts
      - name: Deploy on server (pull images + runtime compose, no git build)
        run: |
          DEPLOY_PATH='${{ secrets.DEPLOY_PATH }}'
          ssh ${{ secrets.HETZNER_USER }}@${{ secrets.HETZNER_HOST }} \
            "export DEPLOY_ROOT='${DEPLOY_PATH}' GIT_BRANCH='main'; bash -s" \
            < infra/deploy_on_server.sh
