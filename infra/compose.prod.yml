# Прод: деплой ВСЕГДА через этот файл (-f infra/compose.prod.yml).
# Веб снаружи :8080. API снаружи: HOST_API_PORT (по умолчанию 8000); внутри контейнера api всегда 8000.
#
# ВАЖНО: без явного --env-file корень репо Compose по умолчанию подставляет переменные из infra/.env,
# а не из ../.env — HOST_API_PORT из корневого .env игнорируется, порт остаётся 8000.
# Запуск из корня репозитория (/opt/my_assistant):
#   docker compose --env-file .env -f infra/compose.prod.yml up -d --build api
# или одной строкой с абсолютным путём к .env:
#   docker compose --env-file /opt/my_assistant/.env -f infra/compose.prod.yml up -d --build api
#
# Если ошибка «Bind 8000 already allocated» — в корневом .env: HOST_API_PORT=8001 и команда выше с --env-file.
# build.context apps/* — относительно infra/; см. deploy_on_server.sh.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-my_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-my_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 3s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data

  api:
    build:
      # Пути относительно каталога этого файла (infra/); иначе Docker ищет infra/apps/api.
      context: ../apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - path: ../.env
        required: true
      - path: ../.env.local
        required: false
    environment:
      # Только литерал: иначе в .env бывает APP_PORT= и Docker передаёт пустую строку в контейнер.
      APP_PORT: "8000"
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    ports:
      - "${HOST_API_PORT:-8000}:8000"
    volumes:
      - api_storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 5s
      timeout: 5s
      retries: 18
      start_period: 60s

  worker:
    build:
      context: ../apps/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    env_file:
      - path: ../.env
        required: true
      - path: ../.env.local
        required: false
    environment:
      APP_ENV: ${APP_ENV:-development}
      WORKER_API_BASE: http://api:8000
      MOY_ARBITR_STATE_PATH: /app/moy_arbitr/state.json
    volumes:
      - moy_arbitr_state:/app/moy_arbitr

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
  minio_data:
  api_storage:
  moy_arbitr_state:
