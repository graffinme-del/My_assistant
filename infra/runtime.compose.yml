# Прод: только готовые образы из ghcr.io — на сервере не нужен исходный код и docker build.
# Обновление: push в main → GitHub собирает образа → deploy тянет этот файл с raw и docker compose pull.
name: my_assistant

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-my_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-my_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    image: ghcr.io/graffinme-del/my_assistant/api:main
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_PORT: "8000"
      POSTGRES_DB: ${POSTGRES_DB:-my_assistant}
      POSTGRES_USER: ${POSTGRES_USER:-my_assistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_PORT: 5432
      POSTGRES_HOST: postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      LLM_HTTP_REFERER: ${LLM_HTTP_REFERER:-}
      LLM_APP_TITLE: ${LLM_APP_TITLE:-My Assistant}
      OWNER_TOKEN: ${OWNER_TOKEN:-owner-dev-token}
      MEMBER_TOKEN: ${MEMBER_TOKEN:-member-dev-token}
    ports:
      - "8000:8000"
    volumes:
      - api_storage:/app/storage

  worker:
    image: ghcr.io/graffinme-del/my_assistant/worker:main
    restart: unless-stopped
    depends_on:
      - redis
      - postgres
    environment:
      APP_ENV: ${APP_ENV:-development}

  web:
    image: ghcr.io/graffinme-del/my_assistant/web:main
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
  minio_data:
  api_storage:
